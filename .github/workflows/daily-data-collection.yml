name: daily-data-collection

# Runs each weekday at 10:30 UTC = 4:00 PM IST (NSE closes at 3:30 PM IST;
# final OHLCV bars are settled by ~4:00 PM IST).
# Collects:
#   1. OHLCV market data  — Data_update.py appends today's bars to Google Sheets
#   2. NIFTY / VIX index  — features.cross_sectional refreshes regime cache
#   3. News headlines + article bodies  — ingestion.news_ingest (yfinance + trafilatura)
#   4. Reddit posts        — ingestion.reddit_ingest (anonymous JSON scrape)
#   5. X / Twitter posts   — ingestion.x_ingest (snscrape → nitter fallback)
#   6. FinBERT sentiment   — features.sentiment aggregates all three text channels
#
# All text-channel data is written to Firestore when credentials are present.
# Parquet staging files under Data/archive/ are always written as a fallback.

on:
  schedule:
    - cron: "30 10 * * 1-5"   # 10:30 UTC Mon–Fri = 4:00 PM IST
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to process (blank = full NIFTY 50)"
        required: false
        type: string
      skip_sentiment:
        description: "Skip FinBERT sentiment step (faster, saves ~5 min)"
        required: false
        type: boolean
        default: false

concurrency:
  group: daily-data-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps (CPU torch for sentiment; no GPU needed)
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch==2.6.0+cpu"
          pip install \
            "pandas>=2.0,<3.0" \
            "numpy>=1.24,<2.0" \
            "pyarrow>=14.0" \
            "scikit-learn>=1.3,<2.0" \
            "yfinance>=0.2.38" \
            "gspread>=6.0" \
            "google-auth>=2.28" \
            "google-cloud-firestore>=2.16" \
            "requests>=2.31" \
            "beautifulsoup4>=4.12" \
            "trafilatura>=1.12" \
            "transformers>=4.36" \
            "sentencepiece>=0.1.99" \
            "pydantic>=1.10,<3" \
            "python-dotenv>=1.0" \
            "pandas-ta>=0.3.14b0" \
            "plotly>=5.20"

      - name: Install snscrape (best-effort — X step continues without it)
        run: pip install snscrape>=0.7 || true

      - name: Restore Google credentials
        env:
          GCP_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GCP_JSON" > credentials/service-account.json
          chmod 600 credentials/service-account.json

      - name: Create output directories
        run: mkdir -p Data/archive outputs

      - name: Run full data collection pipeline
        env:
          GOOGLE_CREDENTIALS: ${{ github.workspace }}/credentials/service-account.json
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials/service-account.json
          SHEET_ID: ${{ secrets.SHEET_ID }}
          FIRESTORE_PROJECT: ${{ secrets.FIRESTORE_PROJECT }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail

          EXTRA_FLAGS=""

          # Optional ticker filter (workflow_dispatch only)
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --tickers ${{ github.event.inputs.tickers }}"
          fi

          # Skip sentiment if manually requested
          if [ "${{ github.event.inputs.skip_sentiment }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --no-sentiment"
          fi

          python -m ingestion.collect_all \
            --sheet-id "$SHEET_ID" \
            --google-credentials "$GOOGLE_CREDENTIALS" \
            $EXTRA_FLAGS \
            | tee outputs/collect_all_summary.json

      - name: Upload collection summary + parquet snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-collection-${{ github.run_id }}
          path: |
            outputs/collect_all_summary.json
            Data/archive/news.parquet
            Data/archive/reddit_posts.parquet
            Data/archive/x_posts.parquet
            Data/archive/sentiment_features.parquet
            Data/archive/indices.parquet
          retention-days: 7
          if-no-files-found: ignore

      - name: Slack summary
        if: always() && env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" = "success" ]; then
            emoji=":white_check_mark:"
          else
            emoji=":warning:"
          fi
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${emoji} daily-data-collection ${STATUS} on ${GITHUB_REPOSITORY} (run ${GITHUB_RUN_ID})\"}" \
            "$SLACK_WEBHOOK"
