# =============================================================================
# Stock Market ML Automation — docker-compose.yml
#
# Services:
#   api      — FastAPI + Uvicorn server (port 8000). Primary entry point.
#   watcher  — Google Sheets polling daemon. Calls the API when it detects
#              new data; runs in the same image with a different command.
#   pipeline — One-shot runner for ingestion / fine-tuning (opt-in via
#              --profile tools). Never started by plain `docker compose up`.
#
# Only `api` has a `build:` block. `watcher` and `pipeline` inherit the same
# image tag and skip the build step — BuildKit's parallel builder would race
# to tag the same image twice and fail the second one otherwise.
#
# Volume strategy for outputs/:
#   outputs/Saved_Models  -> baked into the image by the Dockerfile COPY step.
#                            NOT bind-mounted so image weights are never
#                            shadowed by an empty host directory.
#   outputs/main_inference, outputs/plots, outputs/pipeline_metadata.json
#                         -> bind-mounted so results survive container restarts.
# =============================================================================

# ---------------------------------------------------------------------------
# Shared base — inherited by all three services via YAML anchor merge (<<:).
# ---------------------------------------------------------------------------
x-app-shared: &app-shared
  image: stock-market-automation:local
  working_dir: /app
  env_file:
    - .env
  environment:
    PYTHONPATH: /app
    BASE_DIR: /app
    GOOGLE_CREDENTIALS: /app/credentials/Credentials_New.json
    GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/Credentials_New.json
    WORKFLOW_STATE_PATH: /app/state/workflow_state.json
    MONTHLY_FINETUNE_STATE_FILE: /app/state/monthly_finetune_state.json
    LOGS_DIR: /app/logs
    OUTPUTS_DIR: /app/outputs
    OUTPUT_DIR: /app/outputs/main_inference
    MODEL_DIR: /app/outputs/Saved_Models
    METADATA_PATH: /app/outputs/pipeline_metadata.json
    HF_HOME: /app/.cache/huggingface
    DEVICE: cpu
    API_BASE_URL: http://api:8000
  volumes:
    - ./credentials/Credentials_New.json:/app/credentials/Credentials_New.json:ro
    - ./logs:/app/logs
    - ./state:/app/state
    - ./Data:/app/Data
    - ./outputs/main_inference:/app/outputs/main_inference
    - ./outputs/plots:/app/outputs/plots
    - ./outputs/pipeline_metadata.json:/app/outputs/pipeline_metadata.json
    - hf-cache:/app/.cache/huggingface

# ---------------------------------------------------------------------------
services:

  # -- API -------------------------------------------------------------------
  api:
    <<: *app-shared
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_market_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    command:
      - uvicorn
      - "app_data:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--log-level"
      - "info"

  # -- Watcher ---------------------------------------------------------------
  watcher:
    <<: *app-shared
    container_name: stock_market_watcher
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: python -m app.watcher.service
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; data=open('/proc/1/cmdline','rb').read(); sys.exit(0 if b'app.watcher.service' in data else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -- Pipeline (opt-in, one-shot) -------------------------------------------
  # docker compose --profile tools run --rm pipeline python -m ingestion.collect_all
  # docker compose --profile tools run --rm pipeline python monthly_finetune.py --dry-run
  # docker compose --profile tools run --rm pipeline python Data_update.py
  # docker compose --profile tools run --rm pipeline pytest -q
  pipeline:
    <<: *app-shared
    container_name: stock_market_pipeline
    profiles: ["tools"]
    entrypoint: []

# ---------------------------------------------------------------------------
volumes:
  hf-cache:
    name: stock-market-hf-cache
